name: CI/CD Pipeline Backend

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 1. Construir y subir API Ventas a ECR
      - name: Construir imagen Ventas
        uses: docker/build-push-action@v4
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: true
          tags: 994831955535.dkr.ecr.us-east-1.amazonaws.com/innovatech-ventas:latest

      # 2. Construir y subir API Despachos a ECR
      - name: Construir imagen Despachos
        uses: docker/build-push-action@v4
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: true
          tags: 994831955535.dkr.ecr.us-east-1.amazonaws.com/innovatech-despachos:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Desplegar en ECS (Fargate)
        run: |
          aws ecs update-service --cluster innovatech-cluster --service ventas --force-new-deployment
          aws ecs update-service --cluster innovatech-cluster --service despachos --force-new-deployment
